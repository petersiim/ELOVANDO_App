workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - test
        - app_store_credentials
    scripts:
      - name: Set up flutter
        script: |
          flutter channel stable
          flutter upgrade
      - name: Clean project and get packages
        script: |
          flutter clean
          flutter pub get
      - name: Update dependencies
        script: |
          flutter pub upgrade
      - name: Create .env file
        script: |
          echo "OPEN_AI_API_KEY=$OPEN_AI_API_KEY" > .env
      - name: Run build_runner
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      - name: Set up code signing
        script: |
          echo "Debugging environment variables:"
          echo "BUNDLE_ID: $BUNDLE_ID"
          echo "APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID"
          echo "APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "APP_STORE_CONNECT_PRIVATE_KEY (first 10 characters): ${APP_STORE_CONNECT_PRIVATE_KEY:0:10}..."
          
          # Ensure the private key is properly formatted
          FORMATTED_PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g')
          
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$FORMATTED_PRIVATE_KEY"
      - name: Build unsigned IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist --no-codesign
      - name: Verify IPA
        script: |
          if [ -f "build/ios/ipa/ELOVANDO_App.ipa" ]; then
            echo "IPA file generated successfully"
          else
            echo "Error: IPA file not found"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

publishing:
  email:
    recipients:
      - user_1@example.com
      - user_2@example.com