workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - test
    scripts:
      - name: Set up flutter
        script: |
          flutter channel stable
          flutter upgrade
      - name: Clean project and get packages
        script: |
          flutter clean
          flutter pub get
      - name: Update dependencies
        script: |
          flutter pub upgrade
      - name: Create .env file
        script: |
          echo "OPEN_AI_API_KEY=$OPEN_AI_API_KEY" > .env
      - name: Run build_runner
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      - name: Update bundle identifier
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.elovando.app" ios/Runner/Info.plist
      - name: Build unsigned IPA
        script: |
          flutter build ipa --export-options-plist=ios/export_options.plist --no-codesign
      - name: Verify IPA
        script: |
          if [ -f "build/ios/ipa/ELOVANDO_App.ipa" ]; then
            echo "IPA file generated successfully"
          else
            echo "Error: IPA file not found"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa