workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - test
        - app_store_credentials
        - ios_signing
    scripts:
      - name: Set up flutter
        script: |
          flutter channel stable
          flutter upgrade
      - name: Clean project and get packages
        script: |
          flutter clean
          flutter pub get
      - name: Update dependencies
        script: |
          flutter pub upgrade
      - name: Create .env file
        script: |
          echo "OPEN_AI_API_KEY=$OPEN_AI_API_KEY" > .env
      - name: Run build_runner
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      - name: Update bundle identifier
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" ios/Runner/Info.plist
      - name: Set up code signing
        script: |
          echo $IOS_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          echo $IOS_PROVISIONING_PROFILE | base64 --decode > /tmp/provisioning_profile.mobileprovision
          keychain initialize
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $IOS_CERTIFICATE_PASSWORD
          flutter config --enable-ios
      - name: Build signed IPA
        script: |
          xcode-project use-profiles
          flutter build ipa --release \
            --export-options-plist=/tmp/exportOptions.plist \
            --obfuscate --split-debug-info=./debug-info
      - name: Verify IPA
        script: |
          if [ -f "build/ios/ipa/ELOVANDO_App.ipa" ]; then
            echo "IPA file generated successfully"
          else
            echo "Error: IPA file not found"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

publishing:
  email:
    recipients:
      - user_1@example.com
