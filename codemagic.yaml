workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - test
        - app_store_credentials
    scripts:
      - name: Set up flutter
        script: |
          flutter channel stable
          flutter upgrade
      - name: Clean project and get packages
        script: |
          flutter clean
          flutter pub get
      - name: Update dependencies
        script: |
          flutter pub upgrade
      - name: Create .env file
        script: |
          echo "OPEN_AI_API_KEY=$OPEN_AI_API_KEY" > .env
      - name: Run build_runner
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      - name: Run tests (ignore issues)
        script: |
          flutter test || echo "Tests completed with issues, but continuing build."
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Update Info.plist
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" ios/Runner/Info.plist
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Verify IPA
        script: |
          if [ -f "build/ios/ipa/ELOVANDO_App.ipa" ]; then
            echo "IPA file generated successfully"
          else
            echo "Error: IPA file not found"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

publishing:
  email:
    recipients:
      - your.email@example.com